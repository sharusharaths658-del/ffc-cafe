{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4 rounded">

                <h1 class="text-center mb-4">
                    Pay Now
                </h1>

                <div class="mb-3">

                    <div class="d-flex justify-content-between">
                        <span>Subtotal</span>
                        <strong>₹{{ subtotal|floatformat:2 }}</strong>
                    </div>

                    <div class="d-flex justify-content-between">
                        <span>SGST (2.5%)</span>
                        <strong>₹{{ sgst|floatformat:2 }}</strong>
                    </div>

                    <div class="d-flex justify-content-between">
                        <span>CGST (2.5%)</span>
                        <strong>₹{{ cgst|floatformat:2 }}</strong>
                    </div>

                </div>

                <hr>

                <div class="d-flex justify-content-between mb-4">

                    <h4>Total</h4>

                    <h4 class="text-success">
                        ₹{{ total|floatformat:2 }}
                    </h4>

                </div>

                <button id="pay-btn" class="btn btn-success w-100 py-2">

                    Pay ₹{{ order.total_amount|floatformat:2 }}

                </button>

                <a href="{% url 'cart' %}" class="btn btn-outline-dark w-100 mt-3">

                    Back to Cart

                </a>

            </div>

        </div>

    </div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

var options = {

    "key": "{{ key }}",
    "amount": "{{ payment.amount }}",
    "currency": "INR",
    "order_id": "{{ payment.id }}",

    "handler": function (response){

        window.location.href =
        "/payment-success/?payment_id=" +
        response.razorpay_payment_id;

    }

};

var rzp = new Razorpay(options);

document.getElementById('pay-btn').onclick = function(e){

    rzp.open();
    e.preventDefault();

}

</script>

{% endblock %}
